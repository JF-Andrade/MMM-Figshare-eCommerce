name: mmm-env
channels:
  - conda-forge
  - defaults
dependencies:
  # Python version
  - python=3.10

  # Intel MKL for BLAS optimization
  - mkl
  - mkl-service
  - libblas=*=*mkl

  # Core MMM (from conda-forge for proper BLAS linking)
  - pymc>=5.10.0
  - pymc-marketing>=0.4.0
  - arviz>=0.17.0
  - pytensor

  # Experiment Tracking
  - mlflow>=2.10.0

  # Data
  - pandas>=2.0.0
  - numpy>=1.24.0
  - openpyxl>=3.1.0
  - pyarrow>=14.0.0
  - fastparquet>=2023.10.0

  # ML
  - scikit-learn>=1.3.0

  # Visualization
  - matplotlib>=3.7.0
  - seaborn>=0.13.0
  - plotly>=5.18.0
  - fastapi>=0.109.0
  - uvicorn>=0.27.0
  - pydantic>=2.0.0

  # Time Series
  - statsmodels>=0.14.0
  - holidays>=0.40
  - jax==0.4.23
  - jaxlib==0.4.23
  - numpyro==0.13.2

  # Notebooks
  - jupyter>=1.0.0
  - ipykernel>=6.0.0

  # Testing
  - pytest>=7.0.0
  - pytest-mock

  # Pip-only packages
  - pip
  - pip:
      - missingno>=0.5.0
      - arviz-base
      - arviz-stats
      - arviz-plots
